  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: The timing requirement is met with margin
  - id: b
    text: The path is automatically treated as a false path
  - id: c
    text: The design has excessive clock skew
  - id: d
    text: The hold check has been disabled
answer:
  correct: a
  short_explainer: >
    Positive slack means the path meets its timing requirement and still has
    margin left. Negative slack means the requirement is missed.
  explanation: >
    Intel's timing-analysis documentation defines slack as the margin by which a
    requirement is met or not met. Positive slack means the requirement is
    satisfied; negative slack indicates a violation.
notes:
  - Generated from official documentation only.
references:
  - title: Intel Timing Analyzer Example - Clock Analysis Equations
    url: https://www.intel.com/content/www/us/en/support/programmable/support-resources/design-examples/quartus/tq-clock.html
    note: Defines positive slack as meeting a requirement with margin and negative slack as missing it.
