question_type: multiple_choice
title: Meaning of positive slack
prompt: >
  What does positive slack mean in static timing analysis?
code:
  language: null
  snippet: null
topics:
  primary: sta
  secondary:
    - slack
    - sign-convention
    - setup
difficulty: beginner
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: The timing requirement is met with margin
  - id: b
    text: The path is automatically treated as a false path
  - id: c
    text: The design has excessive clock skew
  - id: d
    text: The hold check has been disabled
answer:
  correct: a
  short_explainer: >
    Positive slack means the path meets its timing requirement and still has
    margin left. Negative slack means the requirement is missed.
  explanation: >
    Slack is the remaining timing margin after comparing arrival time against
    required time. A positive value means the path still has headroom, while a
    negative value means the setup or hold requirement is violated.
notes:
  - Revised from ASIC and VLSI timing references.
references:
  - title: Lecture 13 - Timing Analysis
    url: https://eclipse.umbc.edu/robucci/cmpeRSD/Lectures/Lecture13__TimingAnalysis/
    note: Explains that positive slack means the timing requirement is met and negative slack means it is not.
