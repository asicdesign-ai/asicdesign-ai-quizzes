schema_version: 1
id: sta-multicycle-vs-false-path
status: reviewed
review_state: answered
human_verified: false
question_type: multiple_choice
title: Synchronous Path Relaxation
prompt: >
  If a synchronous path is real and still must be timed, but the data is
  intentionally allowed more than one cycle to arrive, which exception should
  be used instead of `set_false_path`?
code:
  language: null
  snippet: null
topics:
  primary: sta
  secondary:
    - multicycle
    - false-path
    - timing-exceptions
difficulty: intermediate
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: A false path constraint
  - id: b
    text: A clock-disable constraint
  - id: c
    text: No constraint at all
  - id: d
    text: A multicycle constraint
answer:
  correct: d
  short_explainer: >
    If the path is still real and must remain timed, use a multicycle
    constraint, not a false path. False paths remove analysis, while multicycle
    keeps the path in timing with relaxed requirements.
  explanation: >
    A false path is for logic paths that structurally exist but are never
    exercised. A multicycle path is different: the path is real, but the design
    intent allows extra destination cycles before capture. Because it remains a
    true path, it should stay in STA with a multicycle constraint rather than
    being removed from analysis.
notes:
  - Revised from ASIC and VLSI timing references.
references:
  - title: Achieving Timing Closure
    url: https://openlane2.readthedocs.io/en/latest/usage/timing_closure/index.html
    note: Distinguishes false paths from multicycle paths and shows that multicycle paths remain timed.
