schema_version: 1
id: sta-clock-uncertainty-effect
status: reviewed
review_state: answered
human_verified: false
question_type: multiple_choice
title: Effect of clock uncertainty
prompt: >
  How does clock uncertainty affect required time in setup and hold analysis?
code:
  language: null
  snippet: null
topics:
  primary: sta
  secondary:
    - clock-uncertainty
    - setup
    - hold
difficulty: intermediate
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: Both setup and hold uncertainty are subtracted from arrival time only
  - id: b
    text: Uncertainty affects hold checks only, not setup checks
  - id: c
    text: Setup uncertainty is subtracted from required time, while hold uncertainty is added to required time
  - id: d
    text: Uncertainty changes clock frequency but not required time
answer:
  correct: c
  short_explainer: >
    Clock uncertainty tightens both checks. It reduces setup margin by shrinking
    required time and reduces hold margin by pushing the hold requirement later.
  explanation: >
    In VLSI STA flows, clock uncertainty is used as a timing margin for skew,
    jitter, and related variation. For setup analysis the uncertainty is
    subtracted from required time, so data must arrive earlier. For hold
    analysis the uncertainty is added to required time, so the data must remain
    stable longer.
notes:
  - Revised from ASIC and VLSI timing references.
references:
  - title: set_clock_uncertainty
    url: https://vlsi.pro/set_clock_uncertainty/
    note: Explains that setup uncertainty is subtracted from required time while hold uncertainty is added.
