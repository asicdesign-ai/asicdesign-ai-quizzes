human_verified: false
question_type: multiple_choice
title: What a multicycle path changes
prompt: >
  What does a multicycle timing constraint do to a synchronous register-to-register path?
code:
  language: null
  snippet: null
topics:
  primary: sta
  secondary:
    - multicycle
    - timing-exceptions
    - setup-hold
difficulty: intermediate
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: It modifies the default setup and hold relationships to reflect extra capture cycles
  - id: b
    text: It removes the path from timing analysis completely
  - id: c
    text: It changes the path into an asynchronous CDC
  - id: d
    text: It disables logic optimization on the path
answer:
  correct: a
  short_explainer: >
    A multicycle constraint relaxes the default single-cycle relationship for a
    synchronous path. The path is still timed, but the setup and related hold
    relationships are changed to match the intended extra capture cycle.
  explanation: >
    A multicycle path is still a real synchronous timing path, so STA keeps
    analyzing it. What changes is the capture relationship: setup may move out
    by N cycles and the companion hold check by N-1 cycles instead of the
    default single-cycle relationship.
notes:
  - Revised from ASIC and VLSI timing references.
