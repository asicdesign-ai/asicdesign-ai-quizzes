schema_version: 1
id: sta-multicycle-modifies-relationship
status: reviewed
review_state: answered
question_type: multiple_choice
title: What a multicycle path changes
prompt: >
  What does a multicycle timing constraint do to a synchronous register-to-register path?
code:
  language: null
  snippet: null
topics:
  primary: sta
  secondary:
    - multicycle
    - timing-exceptions
    - setup-hold
difficulty: intermediate
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: It modifies the default setup and hold relationships to reflect extra capture cycles
  - id: b
    text: It removes the path from timing analysis completely
  - id: c
    text: It changes the path into an asynchronous CDC
  - id: d
    text: It disables logic optimization on the path
answer:
  correct: a
  short_explainer: >
    A multicycle constraint relaxes the default single-cycle relationship for a
    synchronous path. The path is still timed, but the setup and related hold
    relationships are changed to match the intended extra capture cycle.
  explanation: >
    Intel's multicycle-path documentation explains that multicycle constraints
    modify the default setup and hold relationships on a register-to-register
    path. That is why multicycle is different from a false path: the path
    remains part of timing analysis instead of being ignored.
notes:
  - Generated from official documentation only.
references:
  - title: Intel Quartus Prime Pro Edition User Guide - Multicycle Path Analysis
    url: https://www.intel.com/content/www/us/en/docs/programmable/683243/22-3/multicycle-path-analysis.html
    note: States that multicycle constraints modify the default setup and hold relationships.
