human_verified: false
question_type: multiple_choice
title: Setup slack equation
prompt: >
  For a setup check in static timing analysis, how is slack computed?
code:
  language: null
  snippet: null
topics:
  primary: sta
  secondary:
    - setup
    - slack
    - equations
difficulty: beginner
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: Data required time minus data arrival time
  - id: b
    text: Data arrival time minus data required time
  - id: c
    text: Clock period minus launch clock delay only
  - id: d
    text: Setup time plus hold time
answer:
  correct: a
  short_explainer: >
    Setup slack is computed as required time minus arrival time. If arrival is
    later than required, slack becomes negative and the path fails setup.
  explanation: >
    STA compares the latest actual arrival time against the required arrival
    time at the capture point. The usual sign convention is setup slack equals
    required time minus arrival time, so late data produces negative slack.
notes:
  - Revised from ASIC and VLSI timing references.
references:
  - title: Achieving Timing Closure
    url: https://openlane2.readthedocs.io/en/latest/usage/timing_closure/index.html
    note: Shows setup slack as required arrival time minus latest actual arrival time.
