  - title: Intel Timing Analyzer Example - Clock Analysis Equations
    url: https://www.intel.com/content/www/us/en/support/programmable/support-resources/design-examples/quartus/tq-clock.html
    note: Gives the setup slack equation as data required time minus data arrival time.
