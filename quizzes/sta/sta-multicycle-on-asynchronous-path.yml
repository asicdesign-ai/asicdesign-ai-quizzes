human_verified: false
question_type: multiple_choice
title: Multicycle keeps a path in STA
prompt: >
  If a `set_multicycle_path` constraint is applied to a path, does STA still
  perform a timing check on that path?
code:
  language: null
  snippet: null
topics:
  primary: sta
  secondary:
    - multicycle-path
    - timing-constraints
    - timing-exceptions
    - setup-hold
    - sdc
difficulty: intermediate
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: No, async paths are ignored
  - id: b
    text: Depends on the technology lib
  - id: c
    text: Yes, propagation delay is checked
  - id: d
    text: No, only set_max_delay works
answer:
  correct: c
  short_explainer: >
    Yes. If you apply a `set_multicycle_path` constraint, STA still analyzes the
    path timing; the constraint changes the required timing relationship rather than
    disabling analysis. In other words, propagation delay is still checked against
    the updated setup and hold windows.
  explanation: >
    `set_multicycle_path` does not turn a path into a false path. Instead, it tells
    STA to relax or shift the capture relationship by a defined number of cycles, so
    the path remains part of timing analysis. That means the tool still computes
    propagation delay and compares it against the modified setup and hold
    requirements. By contrast, a false-path exception removes the path from normal
    timing analysis.
notes:
  - Correct answer provided by user as choice 3.
references:
  - title: Achieving Timing Closure
    url: https://openlane2.readthedocs.io/en/latest/usage/timing_closure/index.html
    note: Explains that multicycle paths remain timed and that the setup and hold relationships are shifted rather than disabled.
