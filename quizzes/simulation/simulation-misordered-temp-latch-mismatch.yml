schema_version: 1
id: simulation-misordered-temp-latch-mismatch
status: reviewed
review_state: answered
question_type: multiple_choice
title: Misordered temporary variable hazard
prompt: >
  In combinational RTL, what is the risk if a temporary variable is read before
  it is assigned later in the same `always` block?
code:
  language: verilog
  snippet: |
    always @(a or b or c or d) begin
      y = a & b | temp;
      temp = c & d;
    end
topics:
  primary: simulation
  secondary:
    - combinational-logic
    - rtl-vs-gate
    - ordering
difficulty: intermediate
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: RTL simulation can reuse the old temporary value and behave as if the temp were latched
  - id: b
    text: Synthesis will always create a metastability issue
  - id: c
    text: The simulator converts the block into a nonblocking process
  - id: d
    text: The design becomes asynchronous by definition
answer:
  correct: a
  short_explainer: >
    Procedural statements execute in order during RTL simulation. If a temp is
    read before it is updated, the block may use a stale value and simulate like
    it has memory even though synthesis may still infer pure combinational
    logic.
  explanation: >
    The Cummings mismatch paper gives this exact pattern as a pre-vs-post
    synthesis mismatch. In RTL simulation, the earlier read sees the temp's old
    value from the previous activation, which can make the signal act latched
    even though synthesis collapses the logic combinationally.
notes:
  - Authored from source-backed HDL simulation references.
references:
  - title: RTL Coding Styles That Yield Simulation and Synthesis Mismatches
    url: https://csg.csail.mit.edu/6.375/6_375_2006_www/papers/cummings-synth-mismatch-snug99.pdf
    note: Shows that reading a temporary before assigning it can create simulation and synthesis mismatches.
