  - id: c
    text: Linting
  - id: d
    text: Executable Generation
answer:
  correct: b
  short_explainer: >
    `define and `include are preprocessor directives, so they are handled during
    preprocessing. That stage expands macros and inserts included text before the
    simulator moves on to parsing, elaboration, or code generation.
  explanation: >
    The correct answer is preprocessing. In Verilog tool flows, directives such as
    `define, `include, `ifdef, and related compiler directives are resolved by the
    preprocessor before the main compilation pipeline continues. Elaboration happens
    later, when modules are instantiated and parameterized design structure is
    resolved. Linting is a separate analysis activity, and executable generation is
    a later backend step in simulators that compile into an intermediate or native
    executable form.
