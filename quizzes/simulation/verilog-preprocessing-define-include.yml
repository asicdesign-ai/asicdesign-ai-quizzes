question_type: multiple_choice
title: Verilog `define and `include handling stage
prompt: >
  In Verilog simulators, what is the name of the internal process that handles
  `define and `include directives?
code:
  language: null
  snippet: null
topics:
  primary: verilog
  secondary:
    - preprocessing
    - compiler-directives
    - macros
    - include-files
difficulty: beginner
