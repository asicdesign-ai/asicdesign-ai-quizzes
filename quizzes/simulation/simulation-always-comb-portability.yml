answer:
  correct: a
  short_explainer: >
    `always_comb` is meant to describe combinational intent directly, so it is
    less fragile than maintaining a manual sensitivity list. That improves
    simulation consistency and reduces a common source of RTL-vs-gate mismatch.
  explanation: >
    Verilator explicitly recommends `always_comb` for consistent behavior across
    tools, and the classic Cummings mismatch paper shows why incomplete
    sensitivity lists are dangerous in RTL simulation. Using the dedicated
    combinational construct makes the intent clearer and more portable.
