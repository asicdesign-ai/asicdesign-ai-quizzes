title: Elaboration builds the design hierarchy
prompt: >
  In a Verilog simulator build flow, what does elaboration do after parsing?
code:
  language: null
  snippet: null
topics:
  primary: simulation
  secondary:
    - elaboration
    - hierarchy
    - build-flow
difficulty: beginner
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: It expands `define and `include directives
  - id: b
    text: It chooses root modules and instantiates the design hierarchy
  - id: c
    text: It performs gate-level SDF annotation
  - id: d
    text: It replaces assertions with hardware monitors in silicon
answer:
  correct: b
  short_explainer: >
    Elaboration turns parsed module definitions into an actual instance tree.
    That is the stage where tops are chosen and parameterized instances are
    resolved into a concrete design hierarchy.
  explanation: >
    The Icarus Verilog simulation flow separates preprocessing and parsing from
    elaboration. During elaboration, the simulator chooses the root modules and
    instantiates the hierarchy so later steps can optimize or execute a
    concrete design.
