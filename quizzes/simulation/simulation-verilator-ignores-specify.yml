human_verified: false
question_type: multiple_choice
title: Verilator timing-model limitation
prompt: >
  Which statement is true about using Verilator for detailed gate-level timing
  checks?
code:
  language: systemverilog
  snippet: null
topics:
  primary: simulation
  secondary:
    - verilator
    - gate-level-simulation
    - timing-checks
difficulty: intermediate
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: Verilator ignores specify blocks and timing checks, so it is not a full timing-signoff simulator
  - id: b
    text: Verilator fully supports SDF timing checks and specify semantics by default
  - id: c
    text: Verilator can only simulate behavioral code, not synthesizable RTL
  - id: d
    text: Verilator requires program blocks for all testbenches
answer:
  correct: a
  short_explainer: >
    Verilator is great for fast compiled simulation, but its timing semantics
    are not the same as a full event-driven GLS tool. In particular, specify
    blocks and timing checks are ignored.
  explanation: >
    The Verilator language guide explicitly says that specify blocks and timing
    checks are ignored. That makes Verilator excellent for many RTL and some
    cycle-oriented verification tasks, but not a drop-in replacement for full
    gate-level timing signoff simulation.
notes:
  - Authored from source-backed HDL simulation references.
references:
  - title: Input Languages - Verilator
    url: https://veripool.org/guide/latest/languages.html
    note: States that specify blocks and timing checks are ignored.
