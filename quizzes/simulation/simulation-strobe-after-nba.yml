schema_version: 1
id: simulation-strobe-after-nba
status: reviewed
review_state: answered
human_verified: false
question_type: multiple_choice
title: Showing values after NBA updates
prompt: >
  Which system task is the right choice if you want to print values after
  nonblocking assignments update in the current time slot?
code:
  language: verilog
  snippet: |
    a <= 1'b1;
    $display("a=%0b", a);
topics:
  primary: simulation
  secondary:
    - nonblocking
    - debug
    - scheduling
difficulty: intermediate
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: $display
  - id: b
    text: $strobe
  - id: c
    text: $finish
  - id: d
    text: $stop
answer:
  correct: b
  short_explainer: >
    `$display` runs before NBA updates have taken effect in that same time slot.
    `$strobe` is the classic way to report the final updated value for the slot.
  explanation: >
    Cummings explicitly recommends `$strobe` when you want to display values
    assigned with nonblocking assignments. The paper shows that `$display`
    executes earlier, before the NBA updates become visible.
notes:
  - Authored from source-backed HDL simulation references.
references:
  - title: Nonblocking Assignments in Verilog Synthesis, Coding Styles That Kill!
    url: https://csg.csail.mit.edu/6.375/6_375_2009_www/papers/cummings-nonblocking-snug99.pdf
    note: Recommends `$strobe` for displaying values after nonblocking assignment updates in the current time slot.
automation:
  authoring_format: yaml
  build_target: json
  ready_for_ingestion: true
  review_required: false
