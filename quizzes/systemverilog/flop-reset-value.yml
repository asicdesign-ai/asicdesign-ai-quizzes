schema_version: 1
id: sv-flop-reset-value
status: reviewed
review_state: answered
human_verified: false
question_type: multiple_choice
title: Flop reset value
prompt: >
  In the below SystemVerilog code, what should `rst_val` not be set to?
code:
  language: systemverilog
  snippet: |
    always_ff @(posedge clk or negedge rst_n)
        if (~rst_n)
             q[2:0] <= rst_val;
        else
             q[2:0] <= d[2:0];
topics:
  primary: systemverilog
  secondary:
    - reset
    - always_ff
    - sequential-logic
    - flop-coding-style
difficulty: intermediate
source:
  platform: linkedin
  import_kind: manual_completion
choices:
  - id: a
    text: a hardcoded value
  - id: b
    text: input that drives a constant
  - id: c
    text: localparam
  - id: d
    text: stable Q output of a reg/FF
answer:
  correct: d
  short_explainer: >
    Reset values should resolve to a true constant. A stable Q output from another
    flop is still a signal, not a constant reset value, so it is the wrong pattern
    for `rst_val` here.
  explanation: >
    For reset coding, `rst_val` should ideally resolve to a constant reset value.
    A stable Q output from another register or flop is still a signal, not a true
    reset constant, and can undermine clean reset intent or inference. A literal or
    `localparam` is the safer pattern.
