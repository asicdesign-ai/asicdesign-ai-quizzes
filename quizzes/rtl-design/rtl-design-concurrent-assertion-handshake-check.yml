schema_version: 1
id: rtl-design-concurrent-assertion-handshake-check
status: reviewed
review_state: answered
human_verified: false
question_type: multiple_choice
title: Concurrent assertion for a bounded handshake check
prompt: >
  You want an assertion that checks a request is acknowledged within two cycles.
  Which property best matches that intent?
code:
  language: systemverilog
  snippet: |
    // req must be followed by ack in 0, 1, or 2 cycles
topics:
  primary: rtl-design
  secondary:
    - assertions
    - systemverilog
    - handshake
    - verification-aware-rtl
difficulty: advanced
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: assert property (@(posedge clk) disable iff (!rst_n) req |-> ##[0:2] ack);
  - id: b
    text: assert property (@(posedge clk) disable iff (!rst_n) req |=> ack[*2]);
  - id: c
    text: assert property (@(posedge clk) disable iff (!rst_n) ack |-> ##[0:2] req);
  - id: d
    text: assert property (@(posedge clk) disable iff (!rst_n) req ##2 ack);
answer:
  correct: a
  short_explainer: >
    `req |-> ##[0:2] ack` says that once `req` is seen, `ack` must appear within
    the next zero to two cycles. That matches the bounded-handshake intent most
    directly.
  explanation: >
    This question is included because many real ASIC interviews now expect basic
    assertion literacy even for design-leaning candidates. The key is to map the
    English requirement to the property shape: `req` is the trigger, and `ack`
    must follow within a bounded range. The range operator `##[0:2]` is what
    captures "within two cycles" cleanly.

    The distractors are plausible because they each encode a different meaning.
    One reverses the cause-and-effect direction, another changes the timing
    requirement, and another is not a complete implication check. Interviewers
    are not usually looking for deep formal expertise here; they want to know if
    you can write or review a straightforward property tied to an interface rule.
notes:
  - Assertion question kept at interview depth instead of scheduler-region depth to avoid overlap with the simulation lane.
