schema_version: 1
id: rtl-design-flop-reset-value-constant
status: reviewed
review_state: answered
human_verified: false
question_type: multiple_choice
title: Invalid reset-value source in `always_ff` reset code
prompt: >
  In the SystemVerilog code below, what should `rst_val` not be set to if the
  reset value is meant to be a true constant?
code:
  language: systemverilog
  snippet: |
    always_ff @(posedge clk or negedge rst_n)
        if (~rst_n)
             q[2:0] <= rst_val;
        else
             q[2:0] <= d[2:0];
topics:
  primary: rtl-design
  secondary:
    - systemverilog
    - reset
    - always_ff
    - sequential-logic
    - flop-coding-style
difficulty: intermediate
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: a hardcoded value
  - id: b
    text: input that drives a constant
  - id: c
    text: localparam
  - id: d
    text: stable Q output of a reg/FF
answer:
  correct: d
  short_explainer: >
    Reset values should resolve to a true constant. A stable Q output from another
    flop is still a signal, not a constant reset value, so it is the wrong pattern
    for `rst_val` here.
  explanation: >
    This question is really about whether the reset path expresses a constant
    architectural intent or quietly depends on another piece of sequential
    logic. A reset value should normally be a true constant, such as a literal
    or a `localparam`, so that the register comes out of reset with a well-defined
    value that does not depend on another flop's state.

    Using the Q output of another register as `rst_val` is risky because that
    signal is still just a runtime value, not a reset constant. Even if it looks
    stable in a waveform, it does not carry the same clean reset meaning and can
    complicate inference and review. The key distinction is "stable signal"
    versus "true constant reset intent."
