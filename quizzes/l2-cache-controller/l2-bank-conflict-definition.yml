difficulty: beginner
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: Two accesses target the same bank, so one has to wait
  - id: b
    text: A line has both clean and dirty status at the same time
  - id: c
    text: Two cache sets resolve to the same tag value
  - id: d
    text: Main memory returns blocks in a different order than requested
answer:
  correct: a
  short_explainer: >
    In a banked cache, parallelism comes from sending requests to different
    banks. If two accesses land in the same bank, they contend for that bank
    and one must wait.
  explanation: >
    The Wisconsin cache slides define banking as dividing SRAM into banks so
    different banks can be accessed in parallel. They also state that when two
    accesses go to the same bank, a bank conflict occurs and one waits. That is
    exactly the controller-level meaning of a bank conflict.
notes:
  - Generated from primary course and research references only.
