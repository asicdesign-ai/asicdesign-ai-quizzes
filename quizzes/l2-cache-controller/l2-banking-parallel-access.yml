choices:
  - id: a
    text: To allow parallel access to different banks
  - id: b
    text: To eliminate the need for cache tags
  - id: c
    text: To guarantee every access is single-cycle
  - id: d
    text: To remove coherence-related traffic
answer:
  correct: a
  short_explainer: >
    Banking is used to increase access bandwidth by letting different banks be
    accessed in parallel. It does not remove tags or coherence logic.
  explanation: >
    The Wisconsin slides describe banking as dividing SRAM into banks and
    allowing parallel access to different banks. The tradeoff is that requests
    mapping to the same bank can still conflict, so banking improves bandwidth
    but does not make the structure conflict-free.
