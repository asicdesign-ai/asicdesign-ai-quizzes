choices:
  - id: a
    text: Reducing miss rate
  - id: b
    text: Maximizing structural hazards
  - id: c
    text: Minimizing the number of tag bits only
  - id: d
    text: Keeping instruction and data physically split at all costs
answer:
  correct: a
  short_explainer: >
    Lower-level caches are usually designed to reduce miss rate, because they
    are accessed less often but pay a large penalty on a miss.
  explanation: >
    The UPenn cache lecture contrasts upper levels and lower levels directly:
    L1 emphasizes low hit time, while moving down to L2 and L3 shifts emphasis
    toward reducing miss rate because misses are more expensive. That is why
    lower levels often grow capacity and associativity rather than chasing the
    absolute lowest hit latency.
notes:
