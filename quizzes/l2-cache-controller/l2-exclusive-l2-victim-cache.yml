question_type: multiple_choice
title: L2 role in an exclusive hierarchy
prompt: >
  In an exclusive L1/L2 hierarchy, how is L2 commonly described relative to L1?
code:
  language: null
  snippet: null
topics:
  primary: l2-cache-controller
  secondary:
    - exclusive
    - hierarchy
    - victim-cache
difficulty: intermediate
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: As a duplicate copy of every L1 line
  - id: b
    text: As a write-through bypass FIFO only
  - id: c
    text: As a large victim cache that receives lines evicted from L1
  - id: d
    text: As a structure that stores tags but no data
answer:
  correct: c
  short_explainer: >
    In an exclusive hierarchy, a block is in L1 or L2, not both, so L2 acts
    much like a large victim cache for lines displaced from L1.
  explanation: >
    The UPenn lecture says exclusion moves a block to L2 on L1 eviction and
    describes L2 as becoming a large victim cache. MIT's cache hierarchy
    lecture similarly notes that exclusive hierarchies swap lines between inner
    and outer caches on misses rather than keeping duplicates.
notes:
  - Generated from primary course and research references only.
references:
  - title: CIS 501 Caches - Hierarchy Inclusion versus Exclusion
    url: https://acg.cis.upenn.edu/milom/cis501-Fall12/lectures/06_caches.pdf
    note: States that under exclusion, L2 becomes a large victim cache and blocks move to L2 on L1 eviction.
  - title: MIT 6.823 Lecture 4 - Inclusion Policy
    url: https://csg.csail.mit.edu/6.823S20/Lectures/L04.pdf
    note: Describes exclusive caches as swapping lines between inner and outer caches on miss.
