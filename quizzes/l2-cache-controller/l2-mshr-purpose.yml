    url: https://www.cs.auckland.ac.nz/compsci703s1c/resources/Kroft.pdf
    note: Defines MSHRs as miss information and status holding registers used for concurrent outstanding misses.
  - title: gem5 Classic Caches
    url: https://www.gem5.org/documentation/general_docs/memory_system/classic_caches/
