choices:
  - id: a
    text: To hold miss information and status for an outstanding miss
  - id: b
    text: To replace the tag array for hit detection
  - id: c
    text: To store dirty cache lines permanently
  - id: d
    text: To encode the replacement policy only
answer:
  correct: a
  short_explainer: >
    MSHR stands for miss status holding register. It tracks the state and
    bookkeeping needed while a miss is outstanding.
  explanation: >
    Kroft's original lockup-free cache paper requires one miss
    information/status holding register for each miss handled concurrently and
    explains that these registers hold the information needed to process
    returning data and match later accesses to data in transit. That is the
    classic role of an MSHR in a non-blocking controller.
notes:
