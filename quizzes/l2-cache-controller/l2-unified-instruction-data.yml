  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: To dynamically allocate capacity between instructions and data and reduce miss rate
  - id: b
    text: To guarantee simultaneous instruction and data accesses every cycle
  - id: c
    text: To remove set conflicts entirely
  - id: d
    text: Because lower-level caches do not use tags
answer:
  correct: a
  short_explainer: >
    Lower-level caches are often unified so unused instruction capacity can be
    used for data, and vice versa. That helps reduce miss rate where capacity
    matters more.
  explanation: >
    The UPenn cache lecture explicitly says that as designers move down to L2
    and L3, unified instruction and data caching is used to dynamically
    allocate capacity, and that unified L2/L3 helps minimize miss rate. The
    tradeoff is potentially more instruction/data conflicts, but the effect is
    smaller in larger caches.
notes:
