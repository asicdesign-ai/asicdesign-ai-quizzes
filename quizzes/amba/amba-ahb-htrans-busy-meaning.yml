question_type: multiple_choice
title: "Meaning of BUSY on AHB"
prompt: >
  In AHB, what does the BUSY transfer type mean?
code:
  language: null
  snippet: null
topics:
  primary: amba
  secondary:
    - "ahb"
    - "htrans"
    - "bursts"
difficulty: beginner
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: "The subordinate is returning an ERROR response"
  - id: b
    text: "The manager is continuing a burst but the next transfer cannot occur immediately"
  - id: c
    text: "The bus is parked and no burst can resume afterward"
  - id: d
    text: "The current transfer is the final beat of a wrapping burst"
answer:
  correct: b
  short_explainer: >
    BUSY is not a fault response. It lets the manager hold its place in an
    ongoing burst while temporarily delaying the next real data transfer.
  explanation: >
    The AHB transfer-type table says BUSY enables managers to insert idle cycles
    in the middle of a burst. It indicates the burst is continuing, but the next
    transfer cannot take place immediately.
