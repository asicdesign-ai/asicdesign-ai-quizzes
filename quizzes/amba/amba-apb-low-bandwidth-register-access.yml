  primary: amba
  secondary:
    - "apb"
    - "overview"
    - "peripherals"
difficulty: beginner
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: "Highest-throughput cache-coherent data movement between CPUs"
  - id: b
    text: "Long multi-beat DMA bursts with out-of-order completion"
  - id: c
    text: "Low-bandwidth peripheral register access with simple, low-power interfacing"
  - id: d
    text: "Streaming sample data with no address phase"
answer:
  correct: c
  short_explainer: >
    APB is the simple, low-power peripheral bus in the AMBA family. It is meant
    for register-style accesses, not high-throughput pipelined traffic.
  explanation: >
    Arm describes APB as a low-cost, non-pipelined interface optimized for
    minimal power consumption and reduced interface complexity. The spec says it
    is used to connect low-bandwidth peripherals and access programmable control
    registers.
