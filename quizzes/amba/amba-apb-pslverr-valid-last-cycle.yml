  - title: "AMBA APB Protocol Specification"
    url: "https://documentation-service.arm.com/documentation/ihi0024/latest"
    note: "Official Arm APB specification covering operating states, PREADY, PSLVERR, APB revisions, and optional PPROT/PSTRB signaling."
