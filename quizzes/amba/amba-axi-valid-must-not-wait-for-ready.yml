schema_version: 1
id: "amba-axi-valid-must-not-wait-for-ready"
status: reviewed
review_state: answered
human_verified: false
question_type: multiple_choice
title: "AXI rule for asserting VALID"
prompt: >
  For an AXI source driving a channel, which handshake rule is required by the
  protocol?
code:
  language: null
  snippet: null
topics:
  primary: amba
  secondary:
    - "axi"
    - "handshake"
    - "protocol-rules"
difficulty: intermediate
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: "It may wait for READY before asserting VALID"
  - id: b
    text: "It must deassert VALID if READY stays LOW for one cycle"
  - id: c
    text: "It may change the payload while VALID is HIGH if READY is LOW"
  - id: d
    text: "It must assert VALID independently of READY and keep it asserted until the handshake occurs"
answer:
  correct: d
  short_explainer: >
    The source is not allowed to wait for READY before raising VALID. Once VALID
    is asserted, it must stay asserted until the handshake completes.
  explanation: >
    Arm explicitly states that the transmitter or source is not permitted to
    wait until READY is asserted before asserting VALID. The source must also
    keep the information stable and keep VALID asserted until the transfer
    occurs.
notes:
  - "Authored from official Arm AMBA protocol specifications."
references:
  - title: "AMBA AXI Protocol Specification"
    url: "https://documentation-service.arm.com/documentation/ihi0022/latest"
    note: "Official Arm AXI specification covering channel architecture, VALID/READY transport, burst types, WSTRB, and AXI4-Lite behavior."
