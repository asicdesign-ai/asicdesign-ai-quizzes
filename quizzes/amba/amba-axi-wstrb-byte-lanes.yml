  - id: d
    text: "The number of outstanding writes with the same ID"
answer:
  correct: b
  short_explainer: >
    WSTRB is a byte-lane qualifier for WDATA. Each strobe bit says whether the
    corresponding byte lane carries valid data for that write beat.
  explanation: >
    The AXI specification defines one write strobe per eight bits of the write
    data bus. WSTRB identifies which byte lanes of WDATA are valid during a
    write transfer.
