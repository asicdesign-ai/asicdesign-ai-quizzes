  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: "FIXED"
  - id: b
    text: "INCR"
  - id: c
    text: "WRAP"
  - id: d
    text: "EXCLUSIVE"
answer:
  correct: a
  short_explainer: >
    A FIXED burst does not change the address from beat to beat. That makes it a
    natural fit for repeated reads or writes to the same FIFO-mapped location.
  explanation: >
    The Arm AXI specification says a FIXED burst uses the same address for every
    transfer in the burst. It specifically mentions repeated access to the same
    location, such as loading or emptying a FIFO.
