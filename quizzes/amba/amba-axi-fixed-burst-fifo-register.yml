question_type: multiple_choice
title: "AXI burst type for repeated access to one address"
prompt: >
  Which AXI burst type keeps the address constant for every beat, such as
  repeated accesses to a FIFO location?
code:
  language: null
  snippet: null
topics:
  primary: amba
  secondary:
    - "axi"
    - "bursts"
    - "fixed"
