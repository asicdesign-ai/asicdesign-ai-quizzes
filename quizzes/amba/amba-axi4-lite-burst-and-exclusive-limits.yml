choices:
  - id: a
    text: "It requires AXI IDs so that responses can complete out of order"
  - id: b
    text: "It supports wrapping bursts of 2, 4, 8, or 16 beats"
  - id: c
    text: "All transactions are burst length 1 and exclusive accesses are not supported"
  - id: d
    text: "Data interleaving is mandatory for multi-beat reads"
answer:
  correct: c
  short_explainer: >
    AXI4-Lite is the simplified control-plane subset. Its transactions are
    always single-beat, and it does not support exclusive accesses.
  explanation: >
    Arm defines AXI4-Lite so that all transactions have burst length 1 and
    exclusive accesses are not supported. It is intentionally simpler than full
    AXI for control and register access use cases.
