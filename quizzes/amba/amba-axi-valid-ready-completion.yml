  - title: "AMBA AXI Protocol Specification"
    url: "https://documentation-service.arm.com/documentation/ihi0022/latest"
    note: "Official Arm AXI specification covering channel architecture, VALID/READY transport, burst types, WSTRB, and AXI4-Lite behavior."
