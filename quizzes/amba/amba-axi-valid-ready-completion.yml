question_type: multiple_choice
title: "When an AXI channel transfer completes"
prompt: >
  In an AMBA AXI interface, when does a transfer on any channel complete?
code:
  language: null
  snippet: null
topics:
  primary: amba
  secondary:
    - "axi"
    - "handshake"
    - "valid-ready"
difficulty: beginner
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: "Whenever VALID goes HIGH, regardless of READY"
  - id: b
    text: "Only on a rising clock edge when both VALID and READY are HIGH"
  - id: c
    text: "When READY stays HIGH for two consecutive cycles"
  - id: d
    text: "Only after a separate response channel acknowledges the beat"
answer:
  correct: b
  short_explainer: >
    AXI uses the same VALID/READY handshake on every channel. Address, data, and
    control information transfer only on a rising clock edge where both signals
    are asserted.
  explanation: >
    The Arm AXI specification states that all channels use the same VALID/READY
    transport and that a transfer occurs only when both VALID and READY are
    HIGH. That rule applies equally to address, data, and response movement.
notes:
  - "Authored from official Arm AMBA protocol specifications."
