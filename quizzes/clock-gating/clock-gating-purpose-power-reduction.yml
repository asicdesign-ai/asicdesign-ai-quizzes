title: Primary purpose of clock gating
prompt: >
  What is the main purpose of clock gating?
code:
  language: null
  snippet: null
topics:
  primary: clock-gating
  secondary:
    - power
    - dynamic-power
    - fundamentals
difficulty: beginner
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: To reduce dynamic power by stopping clock-driven toggling when logic is idle
  - id: b
    text: To eliminate setup and hold checks on sequential logic
  - id: c
    text: To convert an asynchronous design into a synchronous one
  - id: d
    text: To guarantee zero clock skew across the chip
answer:
  correct: a
  short_explainer: >
    Clock gating is primarily a power-saving technique. By turning a clock off
    when a block is idle, the clock network and the registers it drives stop
    toggling, which cuts dynamic power.
  explanation: >
    Intel and AMD documentation both describe clock gating as a way to reduce
    dynamic power. Intel notes that gating stops both the clock network and the
    driven registers from toggling, while AMD describes BUFGCE and BUFHCE as a
    way to stop dynamic power consumption in the affected logic region.
notes:
  - Generated from official documentation only.
references:
  - title: Intel Quartus Prime Pro Edition User Guide - Use Gated Clocks
    url: https://www.intel.com/content/www/us/en/docs/programmable/683082/24-2/use-gated-clocks.html
    note: Explains that gated clocks reduce power by stopping clock-network and register toggling.
  - title: AMD 7 Series FPGAs Clocking Resources User Guide (UG472)
    url: https://www.amd.com/content/dam/xilinx/support/documents/user_guides/ug472_7Series_Clocking.pdf
    note: States that BUFGCE and BUFHCE can stop dynamic power consumption in gated logic regions.
