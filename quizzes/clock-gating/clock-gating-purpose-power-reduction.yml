title: Primary purpose of clock gating
prompt: >
  What is the main purpose of clock gating?
code:
  language: null
  snippet: null
topics:
  primary: clock-gating
  secondary:
    - power
    - dynamic-power
    - fundamentals
difficulty: beginner
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: To reduce dynamic power by stopping clock-driven toggling when logic is idle
  - id: b
    text: To eliminate setup and hold checks on sequential logic
  - id: c
    text: To convert an asynchronous design into a synchronous one
  - id: d
    text: To guarantee zero clock skew across the chip
answer:
  correct: a
  short_explainer: >
    Clock gating is primarily a power-saving technique. By turning a clock off
    when a block is idle, the clock network and the registers it drives stop
    toggling, which cuts dynamic power.
  explanation: >
    Broad clock-gating references define the technique as selectively turning
    off the clock to idle logic so unnecessary toggling does not occur. Because
    the clock tree and the sequential elements it drives are major dynamic-power
    consumers, stopping those toggles is the main reason clock gating is used.
notes:
  - Authored from broad clock-gating methodology references.
references:
  - title: "Clock Gating: Powering Down Idle Circuits"
    url: https://www.wevolver.com/article/clock-gating
    note: Defines clock gating as stopping clocks to idle logic to reduce dynamic power from unnecessary toggling.
  - title: The Ultimate Guide to Clock Gating
    url: https://anysilicon.com/the-ultimate-guide-to-clock-gating/
    note: Defines clock gating as turning off the clock to parts of the design when not needed to reduce dynamic power.
