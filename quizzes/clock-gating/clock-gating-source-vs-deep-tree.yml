schema_version: 1
id: clock-gating-source-vs-deep-tree
status: reviewed
review_state: answered
question_type: multiple_choice
title: Why source-side clock gating saves more
prompt: >
  Why does gating a clock nearer the source often save more power than gating
  it deeper in the fanout tree?
code:
  language: null
  snippet: null
topics:
  primary: clock-gating
  secondary:
    - power
    - clock-network
    - source-gating
difficulty: intermediate
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: Because the clock network itself consumes switching power, so source gating shuts down more of it
  - id: b
    text: Because source gating automatically removes all timing constraints
  - id: c
    text: Because deeper gating is impossible in real designs
  - id: d
    text: Because source gating converts the design to combinational logic
answer:
  correct: a
  short_explainer: >
    Gating close to the source can shut down more of the clock tree, not just
    the endpoints. That usually gives better power savings than gating farther
    downstream.
  explanation: >
    Broad clock-gating references point out that the clock network itself is a
    large dynamic-power consumer. If gating is done nearer the source, a larger
    portion of the driven clock-tree capacitance is shut off, so the root clock
    sees less effective load and the power savings are larger.
notes:
  - Authored from broad clock-gating methodology references.
references:
  - title: "Clock Gating: Powering Down Idle Circuits"
    url: https://www.wevolver.com/article/clock-gating
    note: Explains that clock networks are a large source of dynamic power and that gating off sections of the clock tree reduces effective capacitance load.
  - title: The Ultimate Guide to Clock Gating
    url: https://anysilicon.com/the-ultimate-guide-to-clock-gating/
    note: Describes clock gating as turning off the clock to parts of the design to reduce dynamic switching activity.
