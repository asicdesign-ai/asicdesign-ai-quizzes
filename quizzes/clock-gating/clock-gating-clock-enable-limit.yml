question_type: multiple_choice
title: Limitation of synchronous clock enable versus source gating
prompt: >
  What is the main limitation of replacing source clock gating with only a
  synchronous clock-enable scheme?
code:
  language: null
  snippet: null
topics:
  primary: clock-gating
  secondary:
    - clock-enable
    - power
    - comparison
difficulty: intermediate
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: The clock network still toggles, so power reduction is smaller
  - id: b
    text: The logic becomes asynchronous
  - id: c
    text: Setup and hold timing are no longer checked
  - id: d
    text: The design can no longer use registers
answer:
  correct: a
  short_explainer: >
    A synchronous clock enable can stop state updates, but it does not stop the
    clock tree itself from toggling. That means it usually saves less power than
    gating the clock at the source.
  explanation: >
    Intel's design recommendations note that a synchronous clock-enable scheme
    can shut down a domain functionally, but the clock network keeps toggling.
    Because of that, the power reduction is usually smaller than source-side
    clock gating, even though the synchronous scheme is often easier to manage.
notes:
  - Generated from official documentation only.
references:
  - title: Intel Quartus Prime Pro Edition User Guide - Use Gated Clocks
    url: https://www.intel.com/content/www/us/en/docs/programmable/683082/24-2/use-gated-clocks.html
    note: Explains that synchronous clock enable leaves the clock network toggling and therefore saves less power than source gating.
