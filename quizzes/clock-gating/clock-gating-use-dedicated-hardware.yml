human_verified: false
question_type: multiple_choice
title: Preferred implementation of clock gating
prompt: >
  When implementing clock gating, what is preferred over using a plain AND or OR
  gate directly on the clock?
code:
  language: null
  snippet: null
topics:
  primary: clock-gating
  secondary:
    - implementation
    - dedicated-hardware
    - clock-buffers
difficulty: beginner
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: Dedicated clock-gating hardware or clock-control buffers
  - id: b
    text: Ordinary combinational logic inserted on any local route
  - id: c
    text: A tristate buffer on the clock line
  - id: d
    text: A larger fanout tree driven from the same ungated clock
answer:
  correct: a
  short_explainer: >
    Dedicated clock-gating resources are preferred because they use proper clock
    routing and avoid many of the skew, hold, and glitch problems that plain
    logic gating can create.
  explanation: >
    Broad clock-gating references recommend using latch-based integrated
    clock-gating cells instead of ad hoc combinational gating. Standard-cell
    ICGs provide a characterized, glitch-free implementation and are designed
    to be handled correctly by synthesis, CTS, and timing analysis.
notes:
  - Authored from broad clock-gating methodology references.
references:
  - title: "Clock Gating: Powering Down Idle Circuits"
    url: https://www.wevolver.com/article/clock-gating
    note: Recommends latch-based gating or library ICG cells in ASIC flows and explains that standard-cell libraries provide integrated clock-gating cells.
  - title: The Ultimate Guide to Clock Gating
    url: https://anysilicon.com/the-ultimate-guide-to-clock-gating/
    note: Explains integrated clock-gating cells and why they are preferred over simple gate-level clock gating.
