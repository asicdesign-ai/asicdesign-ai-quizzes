  - title: AMD 7 Series FPGAs Clocking Resources User Guide (UG472)
    url: https://www.amd.com/content/dam/xilinx/support/documents/user_guides/ug472_7Series_Clocking.pdf
    note: States that violating BUFGCE or BUFGMUX setup requirements can result in a glitch.
  - title: AMD UltraScale Architecture Libraries Guide - BUFGCE_DIV (UG974)
    url: https://docs.amd.com/r/2024.1-English/ug974-vivado-ultrascale-libraries/BUFGCE_DIV
