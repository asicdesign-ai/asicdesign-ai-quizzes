question_type: multiple_choice
title: Enable timing risk on a clock-gating buffer
prompt: >
  What can happen if the enable to a clock-gating circuit changes at the wrong
  time relative to the clock?
code:
  language: null
  snippet: null
topics:
  primary: clock-gating
  secondary:
    - glitch
    - icg
    - implementation
difficulty: intermediate
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: A clock glitch or short pulse can appear at the output
  - id: b
    text: The clock automatically becomes asynchronous to itself
  - id: c
    text: The destination logic is permanently reset
  - id: d
    text: The tool automatically inserts an extra PLL
answer:
  correct: a
  short_explainer: >
    Clock-gating logic must keep the gating decision stable during the active
    phase of the clock. If the enable changes at the wrong time, the gated
    clock can glitch and create a short or malformed pulse.
  explanation: >
    Broad clock-gating references explain that simple gating is glitch-prone if
    the enable changes while the clock is active. That is why practical
    latch-based or integrated clock-gating cells sample the enable during the
    inactive clock phase, so the output either passes a full clock pulse or
    suppresses it cleanly.
notes:
  - Authored from broad clock-gating methodology references.
references:
  - title: The Ultimate Guide to Clock Gating
    url: https://anysilicon.com/the-ultimate-guide-to-clock-gating/
    note: Shows that naive enable-controlled gating can generate glitches and explains latch-based gating as the glitch-free fix.
  - title: "Clock Gating: Powering Down Idle Circuits"
    url: https://www.wevolver.com/article/clock-gating
    note: Explains why enable changes during the wrong clock phase can create glitches and why latch-based or ICG approaches are used.
