  - id: d
    text: One capture pulse
answer:
  correct: d
  short_explainer: >
    A basic OCC generates one capture pulse for stuck-at testing. Two at-speed
    capture pulses are typically used for transition or delay-style testing
    instead.
  explanation: >
    The OCC tutorial states that in stuck-at testing the OCC ensures that only
    one clock pulse is generated in the capture phase. This distinguishes
    stuck-at capture behavior from at-speed capture behavior.
