answer:
  correct: b
  short_explainer: >
    A basic OCC generates two capture pulses for at-speed testing. Those pulses
    are intended to run at the functional clock rate needed for delay-oriented
    tests.
  explanation: >
    The OCC tutorial explicitly says that in at-speed testing the OCC generates
    two capture pulses at the functional clock frequency. This is why OCC logic
    is widely used in scan-friendly at-speed test flows.
