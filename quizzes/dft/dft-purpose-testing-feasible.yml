  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: To add design techniques that make manufacturing test feasible
  - id: b
    text: To eliminate the need for ATPG and ATE completely
  - id: c
    text: To replace functional verification and STA
  - id: d
    text: To prevent all silicon defects from occurring
answer:
  correct: a
  short_explainer: >
    DFT is about improving controllability and observability so faults can be
    detected efficiently in silicon test. It helps test happen; it does not
    replace design verification or remove defects from manufacturing.
  explanation: >
    The cited DFT tutorial defines DFT as the addition of logic and design
    techniques that make testing feasible. In practice, DFT improves how easily
    internal states can be set up and observed during manufacturing test.
