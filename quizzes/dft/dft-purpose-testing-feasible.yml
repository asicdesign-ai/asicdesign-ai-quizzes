title: Purpose of DFT
prompt: >
  What is the main purpose of design-for-testability (DFT) logic in a digital
  chip?
code:
  language: null
  snippet: null
topics:
  primary: dft
  secondary:
    - basics
    - testability
    - manufacturing-test
difficulty: beginner
