question_type: multiple_choice
title: What MBIST primarily targets
prompt: >
  In a SoC DFT strategy, what does MBIST primarily target?
code:
  language: null
  snippet: null
topics:
  primary: dft
  secondary:
    - mbist
    - memory-test
    - sram
difficulty: intermediate
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: Embedded memories such as SRAM arrays
  - id: b
    text: Only PLL lock behavior during scan shift
  - id: c
    text: Only JTAG instruction decoding
  - id: d
    text: Only inter-chip boundary-scan links
answer:
  correct: a
  short_explainer: >
    MBIST exists for memories, not general core logic. It is used because
    embedded memories are dense, numerous, and sensitive to defects, so they
    are usually tested with dedicated memory-test hardware.
  explanation: >
    Electronic Design describes BIST as the methodology of choice for testing
    embedded memories within SoCs. The article explains that a basic memory
    BIST applies regular patterns such as march or checkerboard tests and
    compares the memory outputs against expected responses, which is why MBIST
    primarily targets embedded memories rather than general logic.
notes:
  - Authored from broad DFT methodology references.
