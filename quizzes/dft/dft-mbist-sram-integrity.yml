choices:
  - id: a
    text: The integrity of internal SRAM instances
  - id: b
    text: Only PLL lock behavior during scan shift
  - id: c
    text: Only JTAG instruction decoding
  - id: d
    text: Only inter-chip boundary-scan links
answer:
  correct: a
  short_explainer: >
    MBIST is aimed at memory structures, not generic core logic. In the cited
    example it is explicitly described as hardware for verifying internal SRAM
    integrity.
  explanation: >
    The Infineon MBIST note states that MBIST implements verification of the
    integrity of internal SRAM instances and is controlled by the memory test
    unit. This is a good example of why memory DFT is usually handled
    differently from logic scan.
