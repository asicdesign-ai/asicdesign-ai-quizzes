choices:
  - id: a
    text: They provide better sequence properties and more desirable aliasing behavior
  - id: b
    text: They eliminate all X sources without masking logic
  - id: c
    text: They remove the need for scan chains in LBIST
  - id: d
    text: They guarantee zero-area DFT logic
answer:
  correct: a
  short_explainer: >
    Primitive polynomials are favored because they give better LFSR sequence
    behavior than non-primitive choices. In response analysis, that improves
    how quickly aliasing probability converges to its steady-state value.
  explanation: >
    VLSI Tutorials' response-analyzer discussion notes that aliasing
    probability for primitive-polynomial LFSRs converges faster than for
    non-primitive ones. In practice, primitive polynomials are favored because
    they give the long-sequence pseudo-random behavior used by LFSR-based
    pattern generators and signature analyzers in LBIST-style DFT.
