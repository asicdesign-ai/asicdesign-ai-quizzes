  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: Scan flop D acts like a pseudo primary input and Q acts like a pseudo primary output
  - id: b
    text: Scan flop Q is a pseudo clock and D is a pseudo reset
  - id: c
    text: Both D and Q are treated as boundary-scan pins only
  - id: d
    text: Both D and Q are ignored once scan insertion is complete
answer:
  correct: a
  short_explainer: >
    Scan effectively exposes flop state to test tools. ATPG can treat the flop
    inputs and outputs as if they were extra controllable and observable ports.
  explanation: >
    The DFT tutorial states that scan flop outputs act as pseudo primary outputs
    and scan flop inputs act as pseudo primary inputs. This is the key reason
    scan makes sequential logic much easier for ATPG to handle.
