answer:
  correct: a
  short_explainer: >
    ATPG means Automatic Test Pattern Generation. These tools create test
    patterns that target modeled faults such as stuck-at and at-speed faults.
  explanation: >
    The VLSI Tutorials DFT article states that ATPG stands for Automatic Test
    Pattern Generation. Scan insertion is commonly used to make ATPG easier by
    improving controllability and observability.
