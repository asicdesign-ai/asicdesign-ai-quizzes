question_type: multiple_choice
title: Shift path versus capture path in divider test
prompt: >
  In the cited patent's divider-test architecture, what distinguishes the scan
  shift path from the capture path between the first and second scan cells?
code:
  language: null
  snippet: null
topics:
  primary: dft
  secondary:
    - advanced
    - clock-divider
    - scan-capture
    - patent
difficulty: advanced
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: The shift path bypasses the divider logic, while the capture path passes through the divider logic and second scan cell
  - id: b
    text: The shift path goes through the divider logic, while the capture path bypasses all scan cells
  - id: c
    text: Both shift and capture always use exactly the same path
  - id: d
    text: Neither shift nor capture ever involves the second scan cell
answer:
  correct: a
  short_explainer: >
    The whole point of the patented structure is to keep scan shifting practical
    while still observing divider behavior during capture. So shift bypasses the
    divider logic, but capture exercises it.
  explanation: >
    The patent describes a first path used in scan shift that bypasses the clock
    divider logic, and a second path used in capture that passes through the
    divider logic and the second scan cell. This is how the architecture enables
    testability of divider logic without breaking ordinary scan shifting.
notes:
  - Authored from source-backed DFT references.
references:
  - title: US8898527B2 - At-speed scan testing of clock divider logic in a clock module of an integrated circuit
    url: https://patents.google.com/patent/US8898527B2/en
    note: States that the scan shift phase can bypass the divider logic while the capture phase routes through it.
