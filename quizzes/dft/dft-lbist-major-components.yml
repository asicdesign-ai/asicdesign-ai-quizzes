choices:
  - id: a
    text: PLL, OCC, and clock mux
  - id: b
    text: Boundary scan register, TAP controller, and instruction decoder
  - id: c
    text: BIST controller, test pattern generator, and response analyzer
  - id: d
    text: Decompressor, compactor, and lockup latch
answer:
  correct: c
  short_explainer: >
    A basic LBIST architecture needs control logic, pattern generation, and
    response compaction or analysis. Those roles are commonly described as the
    BIST controller, TPG, and RA.
  explanation: >
    The LBIST tutorial lists the three major components as the BIST controller,
    test pattern generator, and response analyzer. The same article then
    explains how an LFSR can serve as the TPG and a MISR-like structure can
    analyze compressed response.
