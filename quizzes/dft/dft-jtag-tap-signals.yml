  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: TDI, TDO, TCK, and TMS
  - id: b
    text: TDI, TDO, TRST, and TCK
  - id: c
    text: TMS, TRST, SE, and SI
  - id: d
    text: SI, SO, CAPCLK, and SHCLK
answer:
  correct: a
  short_explainer: >
    The mandatory TAP signals are `TDI`, `TDO`, `TCK`, and `TMS`. `TRST` is a
    common optional reset signal, but it is not one of the four mandatory TAP
    signals.
  explanation: >
    The cited TAP tutorial lists four mandatory TAP signals and one optional
    `TRST` signal. This distinction matters because many JTAG flows rely only on
    the four mandatory pins and use a TMS-based reset sequence instead of a
    dedicated reset pin.
