source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: Because control signals are always implemented as asynchronous clocks
  - id: b
    text: Because driving many loads and long routes can make one small-looking signal expensive in delay and buffering
  - id: c
    text: Because synthesis converts every control bit into a multiplier
  - id: d
    text: Because control logic is never optimized by mainstream synthesis tools
answer:
  correct: b
  short_explainer: >
    Timing cost is not only about logic depth. A control net that must reach
    many loads can become slow because of fanout, buffering, and routing.
  explanation: >
    Designers often think first about gates, but large-fanout signals are also
    a wiring problem. One enable or select bit may have to reach many registers
    or muxes, and that physical distribution adds load, buffering stages, and
    route delay.

    That is why a seemingly simple control bit can still appear in critical-path
    reports. The logic expression may be tiny, but the network it drives is not.
notes:
  - Emphasizes fanout cost as a structural timing issue.
