question_type: multiple_choice
title: Why one control bit can become a timing bottleneck
prompt: >
  Why can a single control signal become a critical timing path after synthesis
  even when the Boolean logic behind it looks simple?
code:
  language: systemverilog
  snippet: |
    if (global_en)
      q_bank[i] <= d_bank[i];
topics:
  primary: synthesis
  secondary:
    - fanout
