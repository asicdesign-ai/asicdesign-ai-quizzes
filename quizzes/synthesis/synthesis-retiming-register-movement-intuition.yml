question_type: multiple_choice
title: What retiming can improve without changing cycle behavior
prompt: >
  What is the main idea behind retiming in synthesis?
code:
  language: systemverilog
  snippet: |
    // Conceptual path:
    // reg -> long combinational logic -> reg
topics:
  primary: synthesis
  secondary:
    - retiming
