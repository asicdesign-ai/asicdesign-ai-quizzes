answer:
  correct: c
  short_explainer: >
    MCP stands for MultiCycle Path. It refers to a path that is intentionally
    allowed more than one clock cycle to meet its timing requirement.
  explanation: >
    In timing constraints, MCP means MultiCycle Path. Designers use a
    multicycle-path constraint when data launched on one clock edge is intended
    to be captured after more than one cycle instead of on the very next active
    edge.

    This matters during physical design and timing closure because the timing
    tool must evaluate those paths with the intended cycle relationship rather
    than with the default single-cycle assumption. If the path is truly
    multicycle, applying the correct constraint prevents a valid design intent
    from being reported as a false setup violation.

    The beginner takeaway is simple: MCP is a timing-constraint concept, not a
    power metric or a clock-propagation mode.
