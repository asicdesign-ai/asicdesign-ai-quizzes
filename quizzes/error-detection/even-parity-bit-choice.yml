question_type: multiple_choice
title: How is an even parity bit chosen?
prompt: >
  When using even parity, what must the parity bit do before transmission?
code:
  language: null
  snippet: null
topics:
  primary: error-detection
  secondary:
    - parity
    - framing
    - data-link
difficulty: beginner
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: Make the total number of 1s odd
  - id: b
    text: Make the total number of 1s even
  - id: c
    text: Make the total number of 0s even
  - id: d
    text: Make the checksum equal zero in binary
answer:
  correct: b
  short_explainer: >
    Even parity means the protected word ends with an even count of 1s.
    The parity bit is chosen to force that condition, regardless of the
    payload's original bit pattern.
  explanation: >
    Even parity is the simplest parity convention: add one bit so the total
    number of 1s in the data plus parity bit is even. Odd parity is the same
    idea with the opposite target. Either way, the receiver recomputes the
    parity and checks for a mismatch.
