choices:
  - id: a
    text: Single-bit correction and double-bit detection
  - id: b
    text: Double-bit correction and single-bit detection
  - id: c
    text: Only detection, with no correction capability
  - id: d
    text: Burst correction without any error detection
answer:
  correct: a
  short_explainer: >
    ECC memory usually uses SECDED-style coding. It fixes one flipped bit and
    flags a two-bit error so the system can treat the data as suspect.
  explanation: >
    Memory systems favor a code that can correct the common single-bit upset and
    detect the more dangerous double-bit case. That is the classic SECDED tradeoff:
    correction for the likely fault, detection for the less common but more severe one.
