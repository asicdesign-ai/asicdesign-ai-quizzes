choices:
  - id: a
    text: It eliminates the need for any redundancy bits
  - id: b
    text: It guarantees correction of every multi-bit error
  - id: c
    text: Row and column parity can pinpoint a single-bit error
  - id: d
    text: It only works when the word length is a power of two
answer:
  correct: c
  short_explainer: >
    With row and column parity, a single flipped bit shows up in exactly one
    row and one column. That lets the receiver locate the bad bit and correct
    it, which is stronger than plain parity.
  explanation: >
    Two-dimensional parity arranges the data in a table and adds parity checks
    across both rows and columns. A single-bit error produces one bad row and
    one bad column, so the receiver can identify the intersection. This is a
    simple form of forward error correction, not just detection.
