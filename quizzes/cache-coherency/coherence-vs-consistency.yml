  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: Coherence applies only to write-through caches, while consistency applies only to write-back caches
  - id: b
    text: Coherence is a software policy, while consistency is a hardware protocol
  - id: c
    text: Coherence is specified per memory location, while consistency is specified across all memory locations
  - id: d
    text: Coherence and consistency are two names for the same property
answer:
  correct: c
  short_explainer: >
    Cache coherence is about what all cores observe for one memory location, while
    memory consistency is about ordering relationships across loads and stores to
    all locations. They are related, but they are not the same concept.
  explanation: >
    Sorin, Hill, and Wood explicitly distinguish the two by scope. Coherence is
    defined on a per-location basis: a coherent system must make accesses to a
    single address appear in a sensible order. Consistency is broader and governs
    ordering across different memory locations, which is why a system can be
    coherent yet still expose a relaxed consistency model.
notes:
  - Generated from primary course and research references only.
