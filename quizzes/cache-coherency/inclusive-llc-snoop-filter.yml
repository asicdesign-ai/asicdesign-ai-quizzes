choices:
  - id: a
    text: If a line misses in the inclusive LLC, the system knows it cannot be present in upper-level caches
  - id: b
    text: It guarantees that all dirty data is always already in DRAM
  - id: c
    text: It removes the need for any coherence protocol
  - id: d
    text: It allows multiple caches to write the same line simultaneously
answer:
  correct: a
  short_explainer: >
    Inclusion means upper-level cached lines must also exist in the inclusive LLC.
    So an LLC miss can rule out upper-level hits, which is exactly why it acts like
    a snoop filter.
  explanation: >
    The MICRO paper explains that inclusive caches are beneficial because they serve
    as a natural snoop filter: when an LLC lookup misses, no snoops need to be sent
    to the core caches because the line is guaranteed not to be present there. That
    coherence simplification is one of the classic reasons designers choose
    inclusive hierarchies.
