difficulty: intermediate
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: Every read must come directly from DRAM rather than from another cache
  - id: b
    text: The value at the start of an epoch matches the value at the end of the previous read-write epoch
  - id: c
    text: Every store must immediately update all cache lines in the system
  - id: d
    text: All loads and stores to all addresses must execute in one global total order
answer:
  correct: b
  short_explainer: >
    The Data-Value invariant says values must propagate correctly from one access
    epoch to the next. A reader should observe the value established by the last
    completed write epoch for that location.
  explanation: >
    In the primer's formulation, coherence is not just about who may read or write,
    but also about what value is seen next. The Data-Value invariant says the value
    at the start of an epoch equals the value at the end of the previous read-write
    epoch. That is what prevents a core from reading an arbitrarily old or
    inconsistent value for a coherent address.
