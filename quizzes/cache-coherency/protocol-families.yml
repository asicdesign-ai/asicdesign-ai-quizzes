answer:
  correct: b
  short_explainer: >
    The classic split is snooping versus directory-based coherence. Snooping uses
    broadcast observation, while directory protocols keep track of sharing
    information and target only the nodes that matter.
  explanation: >
    The MESIF paper introduces the standard taxonomy of coherence protocols as
    either snooping or directory-based. Utah's architecture lecture uses the same
    distinction. Interviewers often ask for this split because it leads naturally to
    questions about scalability, broadcast traffic, and sharer tracking.
