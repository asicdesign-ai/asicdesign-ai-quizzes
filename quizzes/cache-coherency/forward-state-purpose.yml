    note: Introduces the Forward state as the designated clean responder in MESIF.
  - title: A Primer on Memory Consistency and Cache Coherence
    url: https://users.cs.utah.edu/~vijay/papers/primer.pdf
    note: Describes F as a clean read-only state from which only one cache may forward data.
