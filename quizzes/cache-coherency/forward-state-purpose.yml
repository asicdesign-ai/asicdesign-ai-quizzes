  import_kind: manual_completion
choices:
  - id: a
    text: To mark the only cache that may supply shared clean data in response to a coherence request
  - id: b
    text: To allow multiple caches to write a line simultaneously
  - id: c
    text: To indicate that a line is dirty and must be written back before any read
  - id: d
    text: To reserve a victim line for the next prefetch stream
answer:
  correct: a
  short_explainer: >
    The `F` state picks one clean sharer as the designated responder. That avoids
    the waste of having multiple shared caches all try to answer the same request.
  explanation: >
    The MESIF paper says `F` is a clean, read-only state, but unlike plain `S`, a
    cache in `F` may forward data to satisfy coherence requests. Only one cache may
    hold `F` at a time, which makes it the single responder for shared clean data
    and reduces unnecessary reply traffic.
