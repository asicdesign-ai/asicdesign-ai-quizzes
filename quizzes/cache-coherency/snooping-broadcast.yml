  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: A central directory is the only component allowed to see coherence requests
  - id: b
    text: Each cache controller monitors shared traffic so it can update state when coherence events occur
  - id: c
    text: Each processor disables private caching for all shared data
  - id: d
    text: Memory always supplies data directly and caches never respond to each other
answer:
  correct: b
  short_explainer: >
    In snooping, caches watch the shared interconnect and react when coherence
    traffic appears. That observation step is what lets every cache keep its local
    state consistent with system-wide events.
  explanation: >
    Utah's lecture describes snooping as every cache block being accompanied by
    sharing status, while all cache controllers monitor the shared bus so they can
    update that status when needed. CMU's lecture makes the same point in a more
    operational way: a cache controller broadcasts a notification, and all other
    controllers snoop it and update their local state.
