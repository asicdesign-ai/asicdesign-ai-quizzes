    url: https://my.eng.utah.edu/~cs6810/pres/07-6810-18.pdf
    note: Describes snooping as all cache controllers monitoring the shared bus and maintaining sharing status.
  - title: CMU 15-418 Cache Coherence Lecture
    url: https://www.cs.cmu.edu/afs/cs/academic/class/15418-f23/www/lectures/10_cachecoherence.pdf
