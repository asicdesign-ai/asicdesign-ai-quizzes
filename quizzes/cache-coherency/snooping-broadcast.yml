question_type: multiple_choice
title: Main idea of snooping coherence
prompt: >
  What is the main mechanism used by a snooping-based cache coherence protocol?
code:
  language: null
  snippet: null
topics:
  primary: cache-coherency
  secondary:
    - protocols
