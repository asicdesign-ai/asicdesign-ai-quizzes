question_type: multiple_choice
title: Purpose of a BusUpg transaction
prompt: >
  In a snooping MESI-style system, what is a `BusUpg` transaction used for?
code:
  language: null
  snippet: null
topics:
  primary: cache-coherency
  secondary:
    - snooping
    - busupg
    - upgrades
difficulty: intermediate
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: To invalidate other sharers when the requester already has the line and does not need data returned
  - id: b
    text: To fetch the full line from memory and invalidate all caches
  - id: c
    text: To downgrade a Modified line to Shared
  - id: d
    text: To force a dirty writeback from the requester to memory
answer:
  correct: a
  short_explainer: >
    `BusUpg` is the no-data upgrade path. It is used when the cache already has the
    line but needs other shared copies invalidated so it can write.
  explanation: >
    CMU's implementation notes describe `BusUpg` as a transaction exactly like
    `BusRdX` except that it does not need to return data. That makes it the natural
    optimization for the `S→M` case when the requester already holds a valid copy.
