question_type: multiple_choice
title: Why a waiting cache must still snoop incoming requests
prompt: >
  Why must a cache controller still be able to service incoming coherence
  transactions while it is waiting to acquire the bus for its own request?
code:
  language: null
  snippet: null
topics:
  primary: cache-coherency
  secondary:
    - controller-implementation
    - deadlock
    - snooping
difficulty: advanced
