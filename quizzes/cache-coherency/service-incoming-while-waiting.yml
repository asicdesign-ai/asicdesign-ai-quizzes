choices:
  - id: a
    text: Otherwise the cache loses its replacement-policy history
  - id: b
    text: Otherwise the cache becomes effectively direct-mapped
  - id: c
    text: Otherwise ECC bits cannot be regenerated
  - id: d
    text: Otherwise the system can deadlock when another core requests a line this cache must provide
answer:
  correct: d
  short_explainer: >
    Waiting for the bus does not remove a cache’s coherence obligations. If it stops
    servicing incoming transactions, another core can block forever waiting for data
    or an acknowledgment this cache is supposed to provide.
  explanation: >
    The CMU lecture gives a concrete fetch-deadlock example: one cache is waiting
    for the bus to issue `BusRdX` on one line while another core issues `BusRd` for
    a different line that the waiting cache currently owns in modified form. To
    avoid deadlock, the waiting cache must still respond to incoming coherence
    traffic.
