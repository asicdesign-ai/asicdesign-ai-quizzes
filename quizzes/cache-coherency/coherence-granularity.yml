  - id: d
    text: Full DRAM rows
answer:
  correct: c
  short_explainer: >
    Coherence is usually tracked at cache-line granularity, not per byte. That is
    why unrelated variables that share one line can still interfere with each other.
  explanation: >
    The primer notes that loads and stores may be as small as a byte, but coherence
    is typically maintained for a larger region, usually the cache block or cache
    line. This design choice keeps hardware practical, but it is also the reason
    false sharing exists: the coherence unit is larger than the individual variable.
