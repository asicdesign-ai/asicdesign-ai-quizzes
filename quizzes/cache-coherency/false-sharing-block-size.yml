question_type: multiple_choice
title: Block size effect on false sharing
prompt: >
  Why can a larger cache block size increase the chance of false sharing?
code:
  language: null
  snippet: null
topics:
  primary: cache-coherency
  secondary:
    - performance
    - false-sharing
