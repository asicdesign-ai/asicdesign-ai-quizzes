difficulty: intermediate
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: Larger blocks force all caches to become fully associative
  - id: b
    text: Larger blocks can place more unrelated words in the same coherence unit
  - id: c
    text: Larger blocks eliminate all cold misses, which exposes false sharing by itself
  - id: d
    text: Larger blocks prevent caches from holding modified data
answer:
  correct: b
  short_explainer: >
    Bigger coherence blocks mean more nearby data gets tied to one cache line. That
    makes it easier for unrelated variables to collide in the same coherence unit
    and interfere with each other.
  explanation: >
    The primer explicitly notes that the larger the coherence block, the greater the
    potential for false sharing. The reason is straightforward: when more unrelated
    data is packed into a single cache line, independent writes are more likely to
    trigger invalidations on that shared line.
