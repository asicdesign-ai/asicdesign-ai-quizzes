  - id: d
    text: Invalidation-based protocols
answer:
  correct: d
  short_explainer: >
    Invalidation-based protocols are the mainstream choice. They fit naturally with
    the single-writer rule and usually avoid the bandwidth cost of updating every
    sharer on each write.
  explanation: >
    CMU's lecture notes say current systems most commonly use an invalidation-based
    protocol. The primer echoes this from a broader perspective, stating that the
    vast majority of coherence protocols are invalidate protocols designed to
    maintain the standard coherence invariants.
