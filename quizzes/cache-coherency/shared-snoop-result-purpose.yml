question_type: multiple_choice
title: Why MESI needs a shared snoop result
prompt: >
  On a read miss in MESI, why does the requester care whether the collective
  snoop result says the line is shared by another cache?
code:
  language: null
  snippet: null
topics:
  primary: cache-coherency
  secondary:
    - mesi
    - snooping
    - shared-state
difficulty: intermediate
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: It selects the replacement way inside the cache set
  - id: b
    text: It determines whether the requester should load the line in Shared or Exclusive
  - id: c
    text: It tells the cache whether ECC should be checked
  - id: d
    text: It decides whether the processor should trap to the OS
answer:
  correct: b
  short_explainer: >
    A read miss can become `Exclusive` only if no one else already has a valid
    copy. If another cache reports sharing, the requester must load the line in
    `Shared` instead.
  explanation: >
    The CMU notes call out this exact purpose: the requester needs to know whether
    the line is shared so it can choose `S` rather than `E`. Without that snoop
    result, the cache controller cannot safely decide whether it has sole ownership
    of a clean copy.
notes:
