  - title: CMU 15-418/618 Lecture 12 - A Basic Snooping-Based Multi-Processor Implementation
    url: https://www.cs.cmu.edu/afs/cs/academic/class/15418-s21/www/lectures/12_snoopimpl.pdf
    note: Explains that the shared snoop result tells the loading cache whether to place the line in S instead of E.
  - title: A Primer on Memory Consistency and Cache Coherence
    url: https://users.cs.utah.edu/~vijay/papers/primer.pdf
