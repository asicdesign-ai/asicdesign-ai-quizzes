  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: It avoids an immediate writeback to memory or LLC while still allowing the block to be shared
  - id: b
    text: It allows all sharers to update the line without invalidations
  - id: c
    text: It forces memory to service every future read instead of peer caches
  - id: d
    text: It removes the need for directories or snooping entirely
answer:
  correct: a
  short_explainer: >
    `Owned` lets the current owner keep responsibility for a dirty line even after a
    read by another core. That avoids an immediate memory update while still
    letting another cache receive the data.
  explanation: >
    The primer calls out the key benefit directly: compared with MSI or MESI, the
    `O` state helps when a cache holding `M` or `E` sees a `GetS`. Without `O`, the
    responder would typically need to send data to both the requestor and memory.
    With `O`, it can keep ownership of the dirty block and defer the writeback.
