question_type: multiple_choice
title: Benefit of adding the Owned state
prompt: >
  Why is adding an `Owned` (`O`) state useful when another core reads a block that
  is currently in `M` or `E`?
code:
  language: null
  snippet: null
topics:
  primary: cache-coherency
  secondary:
    - moesi
    - mosi
    - optimizations
difficulty: intermediate
