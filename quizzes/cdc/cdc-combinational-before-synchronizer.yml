schema_version: 1
id: cdc-combinational-before-synchronizer
status: reviewed
review_state: answered
human_verified: false
question_type: multiple_choice
title: Combinational logic before a synchronizer
prompt: >
  Why is it risky to drive a CDC synchronizer directly from combinational logic
  instead of a source-domain register?
code:
  language: null
  snippet: null
topics:
  primary: cdc
  secondary:
    - synchronizer
    - combinational-logic
    - topology
difficulty: intermediate
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: Combinational glitches can create extra asynchronous events and unsafe captures at the synchronizer input
  - id: b
    text: Combinational logic eliminates metastability before the first flip-flop
  - id: c
    text: Combinational logic is always safe when the destination clock is faster
  - id: d
    text: The only problem is extra dynamic power, not correctness
answer:
  correct: a
  short_explainer: >
    Registering the source signal removes combinational glitches before the
    crossing. Those glitches can look like extra asynchronous events, reduce
    MTBF, and even create spurious pulses at the destination.
  explanation: >
    VerilogPro recommends registering source signals before CDC because
    combinational glitches effectively increase the rate of data crossing the
    boundary and reduce synchronizer MTBF. Aignacio and EDN make the same
    practical point: combinational logic can create short bursts or unequal path
    delays that a destination synchronizer may sample incorrectly, so a clean
    source-domain register is preferred.
notes:
  - Reviewed against CDC references focused on ASIC and VLSI practice.
references:
  - title: Clock Domain Crossing Design - 3 Part Series
    url: https://www.verilogpro.com/clock-domain-crossing-part-1/
    note: Recommends registering source signals before CDC to eliminate combinational glitches that reduce MTBF.
  - title: My two cents about CDC
    url: https://aignacio.com/posts/hdls/cdc_lib/
    note: Shows why combinational logic should be registered before a synchronizer and why raw combinational outputs are unsafe CDC sources.
  - title: Get those clock domains in sync
    url: https://www.edn.com/get-those-clock-domains-in-sync/
    note: Warns against combinational logic before synchronizers because synthesis and unequal path delays can create glitch propagation.
