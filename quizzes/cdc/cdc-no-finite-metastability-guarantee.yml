question_type: multiple_choice
title: Metastability in a single-bit synchronizer
prompt: >
  Which statement about metastability in a single-bit synchronizer is true?
code:
  language: null
  snippet: null
topics:
  primary: cdc
  secondary:
    - metastability
    - synchronizer
    - theory
difficulty: advanced
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: It never occurs if the source and destination clocks run at the same frequency
  - id: b
    text: It disappears completely once two flip-flops are used
  - id: c
    text: It can be reduced to a very low probability, but no finite synchronizer guarantees bounded-time resolution
  - id: d
    text: It depends only on data toggle rate, not on destination clock frequency
answer:
  correct: c
  short_explainer: >
    A synchronizer improves MTBF by increasing resolution time, but no finite
    synchronizer can guarantee metastability resolves within a bounded time.
  explanation: >
    The MIT synchronization lecture and the Technion metastability tutorial make
    the same CDC point: synchronizers are probabilistic risk reducers, not
    absolute guarantees. Additional stages increase the available resolution
    time and improve MTBF, but for any finite resolution interval there remains
    a non-zero probability that a metastable stage has not settled before the
    next sampling edge. In ASIC CDC design, the goal is therefore to drive the
    failure probability low enough for the target product, not to claim zero
    metastability risk.
notes:
  - Authored from source-backed CDC references focused on ASIC and VLSI practice.
references:
  - title: 6.2.6 Synchronization and Metastability
    url: https://www.youtube.com/watch?v=ZPpuDMk9BOU&t=10s
    note: MIT OpenCourseWare explains that no finite tE and tD can guarantee a perfect synchronizer for all asynchronous events.
  - title: "Metastability and Synchronizers: A Tutorial"
    url: https://webee.technion.ac.il/~ran/papers/Metastability-and-Synchronizers.IEEEDToct2011.pdf
    note: Shows that metastability resolution is probabilistic and cannot be eliminated by finite synchronizer structures.
