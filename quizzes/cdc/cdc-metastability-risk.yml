schema_version: 1
id: cdc-metastability-risk
status: reviewed
review_state: answered
human_verified: false
question_type: multiple_choice
title: Main risk in an unsynchronized CDC
prompt: >
  When a signal crosses between unrelated clock domains without proper
  synchronization, what is the primary risk?
code:
  language: null
  snippet: null
topics:
  primary: cdc
  secondary:
    - metastability
    - asynchronous-clocks
    - fundamentals
difficulty: beginner
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: Metastability caused by setup and hold violations at the receiving flip-flop
  - id: b
    text: Automatic retiming between the two clock domains
  - id: c
    text: Guaranteed extra setup margin on the destination path
  - id: d
    text: Deterministic phase alignment after a few cycles
answer:
  correct: a
  short_explainer: >
    The core CDC risk is metastability. Because unrelated clocks can sample data
    near an edge, the receiving flip-flop can violate setup or hold and take
    extra, unpredictable time to resolve.
  explanation: >
    Technion's metastability tutorial and MIT's synchronization lecture both
    explain that asynchronous inputs can violate setup and hold at the receiving
    flip-flop. Once that happens, the latch can enter a metastable state and may
    not resolve before downstream logic samples it, which is why CDC structures
    are built to quarantine and reduce that risk.
notes:
  - Reviewed against CDC references focused on ASIC and VLSI practice.
references:
  - title: "Metastability and Synchronizers: A Tutorial"
    url: https://webee.technion.ac.il/~ran/papers/Metastability-and-Synchronizers.IEEEDToct2011.pdf
    note: Explains how setup and hold violations cause metastability and why synchronizers are necessary at clock-domain boundaries.
  - title: 6.2.6 Synchronization and Metastability
    url: https://www.youtube.com/watch?v=ZPpuDMk9BOU&t=10s
    note: MIT OpenCourseWare lecture explaining why asynchronous inputs can violate setup and hold and drive a register metastable.
  - title: Clock Domain Crossing Design - 3 Part Series
    url: https://www.verilogpro.com/clock-domain-crossing-part-1/
    note: Summarizes metastability as the central CDC problem and motivates synchronizer design.
