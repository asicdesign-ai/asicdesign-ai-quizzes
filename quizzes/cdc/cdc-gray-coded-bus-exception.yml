schema_version: 1
id: cdc-gray-coded-bus-exception
status: reviewed
review_state: answered
question_type: multiple_choice
title: When multi-bit synchronizer buses are valid
prompt: >
  Independent per-bit synchronizer chains on a multi-bit CDC bus are only
  reasonable in which special case?
code:
  language: null
  snippet: null
topics:
  primary: cdc
  secondary:
    - multi-bit-transfer
    - gray-code
    - bus-synchronization
difficulty: intermediate
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: The bus carries a Gray-coded value such as an asynchronous FIFO pointer
  - id: b
    text: The source clock is slower than the destination clock
  - id: c
    text: The bus width is small enough that skew no longer matters
  - id: d
    text: The destination uses three synchronizer stages instead of two
answer:
  correct: a
  short_explainer: >
    Gray code changes only one bit per step, so per-bit synchronization can be
    used for carefully designed pointer crossings. Ordinary multi-bit buses do
    not have that property, so separate synchronizers can create incoherent
    words.
  explanation: >
    VerilogPro, AnySilicon, and aignacio all treat Gray coding as the key
    special case that makes independent bit synchronization practical, most
    notably for asynchronous FIFO pointers. Because only one bit changes per
    increment, the destination avoids impossible intermediate codes that are
    common with ordinary binary or functionally dependent buses.
notes:
  - Reviewed against CDC references focused on ASIC and VLSI practice.
references:
  - title: Clock Domain Crossing Design - 3 Part Series
    url: https://www.verilogpro.com/clock-domain-crossing-part-1/
    note: Uses Gray-coded asynchronous FIFO pointers as the canonical case where missing intermediate values can be acceptable.
  - title: Clock Domain Crossing (CDC)
    url: https://anysilicon.com/clock-domain-crossing-cdc/
    note: Recommends Gray encoding for asynchronous FIFO pointers instead of independently synchronizing ordinary multi-bit buses.
  - title: My two cents about CDC
    url: https://aignacio.com/posts/hdls/cdc_lib/
    note: Explains that Gray counters are used because only one bit changes on each increment, avoiding multi-bit CDC incoherency.
