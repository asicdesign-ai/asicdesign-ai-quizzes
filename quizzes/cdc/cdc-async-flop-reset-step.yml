schema_version: 1
id: vlsi-async-flop-reset-precondition
status: reviewed
review_state: answered
question_type: multiple_choice
title: Step before asserting reset for asynchronous flops
prompt: >
  What is the most important step before asserting reset for asynchronous flops?
topics:
  primary: cdc
  secondary:
    - asynchronous-reset
    - metastability
    - reset-sequencing
    - flops
difficulty: intermediate
source:
  platform: linkedin
  import_kind: manual_completion
choices:
  - id: a
    text: Ensure no data pins are toggling
  - id: b
    text: Turn off the target power/voltage domain
  - id: c
    text: Stop the target clocks
  - id: d
    text: Set scan override high
answer:
  correct: c
  short_explainer: >
    Stopping the target clocks removes active sampling edges while the asynchronous
    reset transition is being applied. That is the safest operational step because it
    avoids clock/reset interaction that can otherwise create metastability or
    recovery/removal hazards around reset activity.
  explanation: >
    Stop the target clocks first. In practice, this is the safest reset sequence for
    asynchronous flops because it removes active clock edges while reset is being
    asserted into the target domain. Intel's HPS reset documentation explicitly includes
    a "Disable Clocks Before Reset Assertion" step, and Intel's asynchronous-reset
    guidance warns that reset timing around clock edges creates recovery/removal and
    metastability concerns, especially during reset release. So even though many vendor
    documents emphasize deassertion as the main metastability hotspot, stopping clocks
    before the reset event is the conservative and robust operational choice.
notes:
  - Correct answer provided by user.
  - Official literature often emphasizes metastability risk on reset deassertion; the quiz explanation frames clock stopping as the conservative operational sequencing step.
references:
  - title: Intel Agilex 3 HPS Technical Reference Manual
    url: https://www.intel.com/content/www/us/en/docs/programmable/848530/25-3/hard-processor-system-technical-reference.html
    note: The clock manager and reset manager flow explicitly includes a section named "Disable Clocks Before Reset Assertion."
  - title: Intel Quartus Prime Pro Edition User Guide - Using Asynchronous Resets
    url: https://www.intel.com/content/www/us/en/docs/programmable/683082/21-3/using-asynchronous-resets.html
    note: Intel warns that asynchronous reset timing around clock edges can lead to metastability and recovery/removal problems, especially on asynchronous release.
  - title: Intel AN 917 - Recovery and Removal Checks
    url: https://www.intel.com/content/www/us/en/docs/programmable/683539/20-4/recovery-and-removal-checks.html
    note: Intel explains recovery/removal timing and metastability hazards around asynchronous reset transitions relative to clock edges.
