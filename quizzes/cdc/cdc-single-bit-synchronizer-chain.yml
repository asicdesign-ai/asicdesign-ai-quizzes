schema_version: 1
id: cdc-single-bit-synchronizer-chain
status: reviewed
review_state: answered
question_type: multiple_choice
title: Recommended structure for a 1-bit CDC signal
prompt: >
  For a 1-bit asynchronous control or status signal, what structure should
  protect the destination side?
code:
  language: null
  snippet: null
topics:
  primary: cdc
  secondary:
    - synchronizer
    - single-bit-transfer
    - destination-domain
difficulty: beginner
source:
  platform: manual
  import_kind: manual_completion
choices:
  - id: a
    text: A chain of two or more registers in the destination clock domain
  - id: b
    text: A single combinational gate before the destination register
  - id: c
    text: A multi-bit synchronizer bus without control logic
  - id: d
    text: A set_max_delay constraint with no synchronizer registers
answer:
  correct: a
  short_explainer: >
    A single-bit asynchronous signal should be protected by a destination-domain
    synchronizer chain. Two flip-flops is the usual baseline so the first stage
    can absorb metastability risk before downstream logic uses the signal.
  explanation: >
    VerilogPro, AnySilicon, and Technion all describe the classic two-stage
    destination-domain synchronizer for a single-bit CDC. The first flip-flop
    may still go metastable, but the next stage gives that value an additional
    clock period to resolve before the destination logic consumes it.
notes:
  - Reviewed against CDC references focused on ASIC and VLSI practice.
references:
  - title: Clock Domain Crossing Design - 3 Part Series
    url: https://www.verilogpro.com/clock-domain-crossing-part-1/
    note: Describes the two flip-flop synchronizer as the basic single-bit CDC structure and explains why it works.
  - title: Clock Domain Crossing (CDC)
    url: https://anysilicon.com/clock-domain-crossing-cdc/
    note: Recommends dual flip-flop synchronizers for most single-bit control-signal crossings.
  - title: "Metastability and Synchronizers: A Tutorial"
    url: https://webee.technion.ac.il/~ran/papers/Metastability-and-Synchronizers.IEEEDToct2011.pdf
    note: Discusses multi-flop synchronizers and how extra resolution time reduces the chance of metastability escaping.
