name: Validate Quiz Metadata

on:
  push:
    branches:
      - main
    paths:
      - "quizzes/**"
      - "scripts/validate-quiz-metadata.sh"
      - "scripts/validate-quiz-structure.py"
      - "scripts/validate-quiz-prose.py"
      - "scripts/validate-quiz-bank.sh"
      - "scripts/quiz-prose-ignore-words.txt"
      - "requirements-quiz-qa.txt"
      - ".github/workflows/quiz-metadata-validation.yaml"
      - "AGENTS.md"
  pull_request:
    paths:
      - "quizzes/**"
      - "scripts/validate-quiz-metadata.sh"
      - "scripts/validate-quiz-structure.py"
      - "scripts/validate-quiz-prose.py"
      - "scripts/validate-quiz-bank.sh"
      - "scripts/quiz-prose-ignore-words.txt"
      - "requirements-quiz-qa.txt"
      - ".github/workflows/quiz-metadata-validation.yaml"
      - "AGENTS.md"

permissions:
  contents: read

jobs:
  validate-quiz-bank:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-quiz-qa.txt

      - name: Install QA dependencies
        run: python3 -m pip install -r requirements-quiz-qa.txt

      - name: Validate quiz structure
        run: python3 scripts/validate-quiz-structure.py

      - name: Validate quiz prose
        run: python3 scripts/validate-quiz-prose.py
