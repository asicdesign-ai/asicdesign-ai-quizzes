name: Validate Quiz Metadata

on:
  push:
    branches:
      - main
    paths:
      - "quizzes/**"
      - "scripts/validate-quiz-metadata.sh"
      - ".github/workflows/quiz-metadata-validation.yaml"
      - "AGENTS.md"
  pull_request:
    paths:
      - "quizzes/**"
      - "scripts/validate-quiz-metadata.sh"
      - ".github/workflows/quiz-metadata-validation.yaml"
      - "AGENTS.md"

permissions:
  contents: read

jobs:
  validate-human-verified:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate quiz metadata
        run: bash scripts/validate-quiz-metadata.sh
